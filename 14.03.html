<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Tasks — Объекты (200 заданий с ответами)</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap");

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a25;
      --border: #2a2a3d;
      --accent: #06b6d4;
      --accent2: #818cf8;
      --accent3: #f59e0b;
      --accent4: #10b981;
      --accent5: #ef4444;
      --accent6: #f472b6;
      --text: #e2e8f0;
      --muted: #64748b;
      --answer-bg: #0f0f1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 15% 25%, rgba(6, 182, 212, 0.08) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 70%, rgba(129, 140, 248, 0.07) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 10%, rgba(244, 114, 182, 0.04) 0%, transparent 40%);
      animation: bgPulse 22s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgPulse {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(1%, 2%) scale(1.02); }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    header {
      padding: 64px 20px 44px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #06b6d4, #818cf8);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 7px 18px;
      border-radius: 20px;
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.8rem);
      font-weight: 900;
      line-height: 1.08;
      background: linear-gradient(135deg, #fff 0%, #06b6d4 45%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 44px;
      line-height: 1.6;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .stat-chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 18px;
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 0.88rem;
    }
    .stat-chip .num {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--accent);
    }

    .progress-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .progress-label {
      font-weight: 600;
      font-size: 0.93rem;
      white-space: nowrap;
    }
    .progress-bar-outer {
      flex: 1;
      min-width: 180px;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #06b6d4, #818cf8);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .progress-count {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.88rem;
      color: var(--accent);
      white-space: nowrap;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 15px;
      color: var(--muted);
      cursor: pointer;
      font-family: "Inter", sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-reset:hover {
      border-color: var(--accent5);
      color: var(--accent5);
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 44px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 240px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 16px 11px 42px;
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-size: 0.93rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
    }
    .search-wrap::before {
      content: "🔍";
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
    }

    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 15px;
      color: var(--muted);
      cursor: pointer;
      font-family: "Inter", sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: #fff;
      background: rgba(6, 182, 212, 0.15);
    }

    .topic-section {
      margin-bottom: 64px;
    }

    .topic-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .topic-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .topic-title {
      font-size: 1.35rem;
      font-weight: 700;
    }

    .topic-count {
      margin-left: auto;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface);
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
    }

    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.22s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .task-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--card-color, #06b6d4), transparent);
      opacity: 0;
      transition: opacity 0.22s;
    }

    .task-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.32);
      border-color: var(--card-color, #06b6d4);
    }
    .task-card:hover::before {
      opacity: 1;
    }

    .task-card.done {
      background: rgba(16, 185, 129, 0.06);
      border-color: rgba(16, 185, 129, 0.28);
    }
    .task-card.done::before {
      opacity: 1;
      background: linear-gradient(90deg, #10b981, transparent);
    }

    .task-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 13px;
    }

    .task-num {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.73rem;
      color: var(--muted);
      background: var(--surface);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .difficulty {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .diff-easy {
      background: rgba(16, 185, 129, 0.13);
      color: #10b981;
    }
    .diff-medium {
      background: rgba(245, 158, 11, 0.13);
      color: #f59e0b;
    }
    .diff-hard {
      background: rgba(239, 68, 68, 0.13);
      color: #ef4444;
    }

    .task-text {
      font-size: 0.92rem;
      line-height: 1.68;
      color: var(--text);
      margin-bottom: 14px;
    }
    .task-text code {
      font-family: "JetBrains Mono", monospace;
      background: var(--surface);
      color: #06b6d4;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.84em;
    }

    .answer-block {
      font-size: 0.88rem;
      line-height: 1.65;
      background: var(--answer-bg);
      border-left: 3px solid var(--card-color, #06b6d4);
      border-radius: 8px;
      padding: 14px 16px;
      margin: 12px 0 10px;
      color: #cbd5e1;
      display: none;
      font-family: "Inter", sans-serif;
    }
    
    .answer-block.show {
      display: block;
    }
    
    .answer-block code {
      font-family: "JetBrains Mono", monospace;
      background: #1e1e2e;
      color: #06b6d4;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.84em;
    }
    
    .answer-block pre {
      background: #1e1e2e;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
    }

    .code-block {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.77rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: #94a3b8;
      margin-bottom: 14px;
      white-space: pre;
      overflow-x: auto;
      line-height: 1.65;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      position: relative;
      z-index: 5;
    }

    .btn-done {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 15px;
      color: var(--muted);
      cursor: pointer;
      font-family: "Inter", sans-serif;
      font-size: 0.79rem;
      font-weight: 600;
      transition: all 0.2s;
      pointer-events: auto;
    }
    .btn-done:hover {
      border-color: #10b981;
      color: #10b981;
    }
    .task-card.done .btn-done {
      background: rgba(16, 185, 129, 0.1);
      border-color: #10b981;
      color: #10b981;
    }

    .float-counter {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: linear-gradient(135deg, #06b6d4, #818cf8);
      border-radius: 20px;
      padding: 13px 22px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
      box-shadow: 0 8px 32px rgba(6, 182, 212, 0.4);
      z-index: 100;
      transition: transform 0.2s;
    }
    .float-counter:hover {
      transform: scale(1.06);
    }

    .hidden {
      display: none !important;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    @media (max-width: 640px) {
      .task-grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 2.3rem;
      }
      .float-counter {
        bottom: 14px;
        right: 14px;
        padding: 10px 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="badge">✦ JavaScript Practice</div>
    <h1>200 заданий<br />Объекты</h1>
    <p class="subtitle">
      Основы · Копирование · Сборка мусора · this · new · ?. · Symbol ·
      Преобразования
    </p>
    <div class="stats">
      <div class="stat-chip"><span class="num">200</span>&nbsp;заданий</div>
      <div class="stat-chip"><span class="num">9</span>&nbsp;тем</div>
      <div class="stat-chip"><span class="num" id="easyCount">0</span>&nbsp;лёгких</div>
      <div class="stat-chip"><span class="num" id="medCount">0</span>&nbsp;средних</div>
      <div class="stat-chip"><span class="num" id="hardCount">0</span>&nbsp;сложных</div>
    </div>
  </header>

  <div class="container">
    <div class="progress-wrap">
      <span class="progress-label">⚡ Прогресс</span>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progressBar" style="width: 0%"></div>
      </div>
      <span class="progress-count" id="progressText">0 / 200</span>
      <button class="btn-reset" onclick="resetAll()">Сбросить</button>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Поиск задания..." oninput="filterTasks()">
      </div>
      <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
      <button class="filter-btn" onclick="setFilter('easy', this)">Лёгкие</button>
      <button class="filter-btn" onclick="setFilter('medium', this)">Средние</button>
      <button class="filter-btn" onclick="setFilter('hard', this)">Сложные</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Выполненные</button>
      <button class="filter-btn" onclick="setFilter('undone', this)">Невыполненные</button>
    </div>

    <div id="tasksRoot"></div>
  </div>

  <div class="float-counter" id="floatCounter">✅ 0 / 200</div>

  <script>
    // БАЗА ОТВЕТОВ ДЛЯ ВСЕХ 200 ЗАДАНИЙ ПО ОБЪЕКТАМ
    const ANSWERS = {
      // ==================== ОБЪЕКТЫ: ОСНОВЫ ====================
      "obj_basics_0": "```js\nconst user = { name: 'Иван', age: 30, isAdmin: true };\nconsole.log(user.name, user.age, user.isAdmin);\n```",
      "obj_basics_1": "Точка: `obj.key`. Скобки: `obj['key']`. Скобки нужны для динамических ключей и ключей с пробелами.",
      "obj_basics_2": "```js\nuser.email = 'ivan@example.com';\n```",
      "obj_basics_3": "```js\ndelete user.email;\n```",
      "obj_basics_4": "1) `'key' in obj` 2) `obj.key !== undefined` (но не различает отсутствие от значения undefined)",
      "obj_basics_5": "Оператор `in` проверяет наличие ключа: `'age' in user` вернёт true если ключ есть.",
      "obj_basics_6": "```js\nfor (let key in user) { console.log(key, user[key]); }\n```",
      "obj_basics_7": "```js\nconst key = 'age';\nconst obj = { [key]: 30 }; // { age: 30 }\n```",
      "obj_basics_8": "```js\nconst name = 'Иван', age = 30;\nconst user = { name, age }; // { name: 'Иван', age: 30 }\n```",
      "obj_basics_9": "`Object.keys(obj)` — массив ключей, `Object.values(obj)` — массив значений.",
      "obj_basics_10": "`Object.entries(obj)` — массив пар [ключ, значение].",
      "obj_basics_11": "```js\nconst user = { name: 'Иван', address: { city: 'Москва' } };\nconsole.log(user.address.city);\n```",
      "obj_basics_12": "```js\nconst user = { name: 'Иван', age: 30 };\nconst { name, age } = user;\n```",
      "obj_basics_13": "```js\nconst { name, age = 18 } = user; // age по умолчанию 18, если в объекте нет\n```",
      "obj_basics_14": "```js\nconst obj1 = { a: 1 };\nconst obj2 = { b: 2 };\nconst merged = { ...obj1, ...obj2 }; // { a: 1, b: 2 }\n```",
      "obj_basics_15": "```js\nconst keys = Object.keys(obj);\nconst values = Object.values(obj);\nconst entries = Object.entries(obj);\n```",
      "obj_basics_16": "```js\nconst entries = [['a', 1], ['b', 2]];\nconst obj = Object.fromEntries(entries); // { a: 1, b: 2 }\n```",
      "obj_basics_17": "`Object.freeze(obj)` — делает объект полностью неизменяемым: нельзя добавлять, удалять, изменять свойства.",
      "obj_basics_18": "`Object.seal(obj)` — запрещает добавлять/удалять свойства, но существующие можно изменять. `freeze` — всё запрещает.",
      "obj_basics_19": "```js\nfunction pick(obj, keys) {\n  return keys.reduce((acc, key) => {\n    if (key in obj) acc[key] = obj[key];\n    return acc;\n  }, {});\n}\n```",
      "obj_basics_20": "```js\nfunction omit(obj, keys) {\n  return Object.keys(obj).reduce((acc, key) => {\n    if (!keys.includes(key)) acc[key] = obj[key];\n    return acc;\n  }, {});\n}\n```",
      "obj_basics_21": "```js\nObject.defineProperty(obj, 'readOnly', { value: 42, writable: false });\n```",
      "obj_basics_22": "**writable** — можно ли изменять, **enumerable** — появляется ли в циклах, **configurable** — можно ли менять дескриптор/удалять. Посмотреть: `Object.getOwnPropertyDescriptor(obj, 'prop')`.",
      "obj_basics_23": "```js\nfunction deepFreeze(obj) {\n  Object.freeze(obj);\n  Object.values(obj).forEach(val => {\n    if (val && typeof val === 'object') deepFreeze(val);\n  });\n  return obj;\n}\n```",
      "obj_basics_24": "```js\nconst user = {\n  firstName: 'Иван', lastName: 'Иванов',\n  get fullName() { return `${this.firstName} ${this.lastName}`; },\n  set fullName(value) { [this.firstName, this.lastName] = value.split(' '); }\n};\n```",

      // ==================== КОПИРОВАНИЕ ОБЪЕКТОВ ====================
      "obj_copy_0": "Объекты хранятся и передаются по ссылке, т.е. переменная хранит адрес в памяти, а не сам объект.",
      "obj_copy_1": "Изменения отразятся в обеих переменных, т.к. они ссылаются на один и тот же объект в памяти.",
      "obj_copy_2": "```js\nconst copy = Object.assign({}, original);\n```",
      "obj_copy_3": "```js\nconst copy = { ...original };\n```",
      "obj_copy_4": "Поверхностная копирует только первый уровень. Глубокая копирует все вложенные объекты рекурсивно.",
      "obj_copy_5": "`obj1 === obj2` проверяет ссылаются ли переменные на один объект, а не равны ли значения.",
      "obj_copy_6": "```js\nfunction shallowEqual(a, b) {\n  if (a === b) return true;\n  const keysA = Object.keys(a), keysB = Object.keys(b);\n  if (keysA.length !== keysB.length) return false;\n  return keysA.every(key => a[key] === b[key]);\n}\n```",
      "obj_copy_7": "```js\nconst deepCopy = JSON.parse(JSON.stringify(obj));\n```\nОграничения: теряет функции, undefined, Symbol, не работает с циклическими ссылками.",
      "obj_copy_8": "```js\nconst deepCopy = structuredClone(obj);\n```\nПоддерживает циклические ссылки, даты, Map, Set, но не функции.",
      "obj_copy_9": "```js\nfunction deepClone(obj, hash = new WeakMap()) {\n  if (obj === null || typeof obj !== 'object') return obj;\n  if (hash.has(obj)) return hash.get(obj);\n  const clone = Array.isArray(obj) ? [] : {};\n  hash.set(obj, clone);\n  for (let key in obj) {\n    if (obj.hasOwnProperty(key)) {\n      clone[key] = deepClone(obj[key], hash);\n    }\n  }\n  return clone;\n}\n```",
      "obj_copy_10": "Циклическая ссылка — когда объект ссылается сам на себя. `structuredClone` работает с ними, JSON.stringify — нет.",
      "obj_copy_11": "```js\nfunction deepEqual(a, b) {\n  if (a === b) return true;\n  if (typeof a !== 'object' || typeof b !== 'object' || a === null || b === null) return false;\n  const keysA = Object.keys(a), keysB = Object.keys(b);\n  if (keysA.length !== keysB.length) return false;\n  return keysA.every(key => deepEqual(a[key], b[key]));\n}\n```",
      "obj_copy_12": "```js\nfunction deepMerge(target, source) {\n  const result = { ...target };\n  for (let key in source) {\n    if (source.hasOwnProperty(key)) {\n      if (typeof source[key] === 'object' && source[key] !== null && target[key]) {\n        result[key] = deepMerge(target[key], source[key]);\n      } else {\n        result[key] = source[key];\n      }\n    }\n  }\n  return result;\n}\n```",
      "obj_copy_13": "Функции и Symbol-ключи теряются в JSON, остаются в structuredClone. Прототипные свойства обычно теряются при простом копировании.",
      "obj_copy_14": "```js\nfunction immutableSet(obj, path, value) {\n  const keys = path.split('.');\n  const result = { ...obj };\n  let current = result;\n  for (let i = 0; i < keys.length - 1; i++) {\n    current[keys[i]] = { ...current[keys[i]] };\n    current = current[keys[i]];\n  }\n  current[keys[keys.length - 1]] = value;\n  return result;\n}\n```",

      // ==================== СБОРКА МУСОРА ====================
      "gc_0": "Автоматическое освобождение памяти от объектов, которые больше не достижимы из корней.",

    const STORAGE_KEY = "jsTasks5_done";
    let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    let currentFilter = "all";
    let searchQuery = "";
    const TOTAL = 200;

    function formatAnswer(text) {
      if (!text) return '<p>Ответ готовится...</p>';
      let formatted = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/```js\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/```ini\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/```json\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/```yaml\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
      return `<p>${formatted}</p>`;
    }

    function toggleAnswer(card, id) {
      let answerDiv = card.querySelector('.answer-block');
      if (!answerDiv) {
        answerDiv = document.createElement('div');
        answerDiv.className = 'answer-block';
        const answerText = ANSWERS[id] || 'Ответ готовится...';
        answerDiv.innerHTML = formatAnswer(answerText);
        card.appendChild(answerDiv);
      }
      answerDiv.classList.toggle('show');
    }

    function renderAll() {
      const root = document.getElementById("tasksRoot");
      root.innerHTML = "";

      let easy = 0,
        med = 0,
        hard = 0;
      TOPICS.forEach((t) =>
        t.tasks.forEach((tk) => {
          if (tk.d === "easy") easy++;
          else if (tk.d === "medium") med++;
          else hard++;
        }),
      );
      document.getElementById("easyCount").textContent = easy;
      document.getElementById("medCount").textContent = med;
      document.getElementById("hardCount").textContent = hard;

      let num = 0;
      TOPICS.forEach((topic) => {
        const sec = document.createElement("section");
        sec.className = "topic-section";

        const hdr = document.createElement("div");
        hdr.className = "topic-header";
        hdr.innerHTML = `
          <div class="topic-icon" style="background:${topic.color}1a;color:${topic.color}">${topic.icon}</div>
          <span class="topic-title">${topic.title}</span>
          <span class="topic-count">${topic.tasks.length} заданий</span>
        `;
        sec.appendChild(hdr);

        const grid = document.createElement("div");
        grid.className = "task-grid";

        topic.tasks.forEach((task, i) => {
          num++;
          const id = `${topic.id}_${i}`;
          const isDone = !!done[id];

          const card = document.createElement("div");
          card.className = "task-card" + (isDone ? " done" : "");
          card.style.setProperty("--card-color", topic.color);
          card.dataset.diff = task.d;
          card.dataset.done = isDone ? "1" : "0";
          card.dataset.text = task.t.replace(/<[^>]+>/g, "").toLowerCase();
          card.dataset.id = id;

          const labels = { easy: "Лёгкое", medium: "Среднее", hard: "Сложное" };
          const classes = { easy: "diff-easy", medium: "diff-medium", hard: "diff-hard" };

          card.innerHTML = `
            <div class="task-top">
              <span class="task-num">#${String(num).padStart(3, "0")}</span>
              <span class="difficulty ${classes[task.d]}">${labels[task.d]}</span>
            </div>
            <div class="task-text">${task.t}</div>
            ${task.code ? `<div class="code-block">${task.code}</div>` : ""}
            <div class="task-actions">
              <button class="btn-done" onclick="event.stopPropagation(); toggleDone('${id}', this)">
                ${isDone ? "✅ Сделано" : "○ Выполнено"}
              </button>
            </div>
          `;

          card.addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-done')) return;
            toggleAnswer(card, id);
          });

          grid.appendChild(card);
        });

        sec.appendChild(grid);
        root.appendChild(sec);
      });

      updateProgress();
      applyFilter();
    }

    function toggleDone(id, btn) {
      done[id] = !done[id];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
      const card = btn.closest(".task-card");
      card.classList.toggle("done", done[id]);
      card.dataset.done = done[id] ? "1" : "0";
      btn.innerHTML = done[id] ? "✅ Сделано" : "○ Выполнено";
      updateProgress();
    }

    function updateProgress() {
      const cnt = Object.values(done).filter(Boolean).length;
      const pct = ((cnt / TOTAL) * 100).toFixed(1);
      document.getElementById("progressBar").style.width = pct + "%";
      document.getElementById("progressText").textContent = `${cnt} / ${TOTAL}`;
      document.getElementById("floatCounter").textContent = `✅ ${cnt} / ${TOTAL}`;
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      applyFilter();
    }

    function filterTasks() {
      searchQuery = document.getElementById("searchInput").value.toLowerCase();
      applyFilter();
    }

    function applyFilter() {
      document.querySelectorAll(".task-card").forEach((card) => {
        let show = true;
        const d = card.dataset.diff;
        const dn = card.dataset.done === "1";
        if (currentFilter === "easy") show = d === "easy";
        else if (currentFilter === "medium") show = d === "medium";
        else if (currentFilter === "hard") show = d === "hard";
        else if (currentFilter === "done") show = dn;
        else if (currentFilter === "undone") show = !dn;
        if (searchQuery && !card.dataset.text.includes(searchQuery)) show = false;
        card.classList.toggle("hidden", !show);
      });

      document.querySelectorAll(".topic-section").forEach((sec) => {
        const vis = [...sec.querySelectorAll(".task-card")].some((c) => !c.classList.contains("hidden"));
        sec.classList.toggle("hidden", !vis);
      });
    }

    function resetAll() {
      if (confirm("Сбросить весь прогресс?")) {
        done = {};
        localStorage.removeItem(STORAGE_KEY);
        renderAll();
      }
    }

    renderAll();
  </script>
</body>
</html>
