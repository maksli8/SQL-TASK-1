<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Tasks — Функции (200 заданий с ответами)</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap");

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a25;
      --border: #2a2a3d;
      --accent: #a855f7;
      --accent2: #f472b6;
      --accent3: #f59e0b;
      --accent4: #10b981;
      --accent5: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --answer-bg: #0f0f1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 15% 25%, rgba(168, 85, 247, 0.09) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 75%, rgba(244, 114, 182, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(16, 185, 129, 0.04) 0%, transparent 60%);
      animation: bgShift 20s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(1.5%, 2%) rotate(2deg); }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    header {
      padding: 60px 20px 40px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #a855f7, #f472b6);
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, #a855f7 45%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .stat-chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }

    .stat-chip .num {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }

    .progress-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .progress-label {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
    }
    .progress-bar-outer {
      flex: 1;
      min-width: 200px;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #a855f7, #f472b6);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .progress-count {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
      color: var(--accent);
      white-space: nowrap;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--muted);
      cursor: pointer;
      font-family: "Inter", sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-reset:hover {
      border-color: var(--accent5);
      color: var(--accent5);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px 12px 44px;
      color: var(--text);
      font-family: "Inter", sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
    }
    .search-wrap::before {
      content: "🔍";
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
    }

    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--muted);
      cursor: pointer;
      font-family: "Inter", sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: white;
      background: rgba(168, 85, 247, 0.15);
    }

    .topic-section {
      margin-bottom: 60px;
    }

    .topic-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      padding-top: 16px;
      z-index: 10;
    }

    .topic-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .topic-title {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .topic-count {
      margin-left: auto;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .task-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--card-color, #a855f7), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-card:hover {
      border-color: var(--card-color, #a855f7);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }
    .task-card:hover::before {
      opacity: 1;
    }

    .task-card.done {
      background: rgba(16, 185, 129, 0.07);
      border-color: rgba(16, 185, 129, 0.3);
    }
    .task-card.done::before {
      opacity: 1;
      background: linear-gradient(90deg, #10b981, transparent);
    }

    .task-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .task-num {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .difficulty {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .diff-easy {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
    }
    .diff-medium {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }
    .diff-hard {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .task-text {
      font-size: 0.93rem;
      line-height: 1.65;
      color: var(--text);
      margin-bottom: 14px;
    }

    .task-text code {
      font-family: "JetBrains Mono", monospace;
      background: var(--surface);
      color: #a855f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
    }

    .answer-block {
      font-size: 0.88rem;
      line-height: 1.65;
      background: var(--answer-bg);
      border-left: 3px solid var(--card-color, #a855f7);
      border-radius: 8px;
      padding: 14px 16px;
      margin: 12px 0 10px;
      color: #cbd5e1;
      display: none;
      font-family: "Inter", sans-serif;
    }
    
    .answer-block.show {
      display: block;
    }
    
    .answer-block code {
      font-family: "JetBrains Mono", monospace;
      background: #1e1e2e;
      color: #a855f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.84em;
    }
    
    .answer-block pre {
      background: #1e1e2e;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
    }

    .code-block {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: #94a3b8;
      margin-bottom: 14px;
      white-space: pre;
      overflow-x: auto;
      line-height: 1.6;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      position: relative;
      z-index: 5;
    }

    .btn-done {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--muted);
      cursor: pointer;
      font-family: "Inter", sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
      pointer-events: auto;
    }
    .btn-done:hover {
      border-color: #10b981;
      color: #10b981;
    }
    .task-card.done .btn-done {
      background: rgba(16, 185, 129, 0.1);
      border-color: #10b981;
      color: #10b981;
    }

    .float-counter {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(135deg, #a855f7, #f472b6);
      border-radius: 20px;
      padding: 14px 22px;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 8px 30px rgba(168, 85, 247, 0.45);
      z-index: 100;
      transition: transform 0.2s;
      cursor: default;
    }
    .float-counter:hover {
      transform: scale(1.05);
    }

    .hidden {
      display: none !important;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    @media (max-width: 600px) {
      .task-grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 2.5rem;
      }
      .float-counter {
        bottom: 16px;
        right: 16px;
        padding: 10px 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="badge">✦ JavaScript Practice</div>
    <h1>200 заданий<br />Функции & Стрелки</h1>
    <p class="subtitle">Функции · Function Expression · Стрелочные функции</p>
    <div class="stats">
      <div class="stat-chip"><span class="num">200</span>&nbsp;заданий</div>
      <div class="stat-chip"><span class="num">3</span>&nbsp;темы</div>
      <div class="stat-chip"><span class="num" id="easyCount">0</span>&nbsp;лёгких</div>
      <div class="stat-chip"><span class="num" id="medCount">0</span>&nbsp;средних</div>
      <div class="stat-chip"><span class="num" id="hardCount">0</span>&nbsp;сложных</div>
    </div>
  </header>

  <div class="container">
    <div class="progress-wrap">
      <span class="progress-label">⚡ Прогресс</span>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progressBar" style="width: 0%"></div>
      </div>
      <span class="progress-count" id="progressText">0 / 200</span>
      <button class="btn-reset" onclick="resetAll()">Сбросить</button>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Поиск задания..." oninput="filterTasks()">
      </div>
      <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
      <button class="filter-btn" onclick="setFilter('easy', this)">Лёгкие</button>
      <button class="filter-btn" onclick="setFilter('medium', this)">Средние</button>
      <button class="filter-btn" onclick="setFilter('hard', this)">Сложные</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Выполненные</button>
      <button class="filter-btn" onclick="setFilter('undone', this)">Невыполненные</button>
    </div>

    <div id="tasksRoot"></div>
  </div>

  <div class="float-counter" id="floatCounter">✅ 0 / 200</div>

  <script>
    // БАЗА ОТВЕТОВ ДЛЯ ВСЕХ 200 ЗАДАНИЙ
    const ANSWERS = {
      // ==================== ФУНКЦИИ ====================
      "functions_0": "```js\nfunction greet(name) {\n  return `Привет, ${name}!`;\n}\n```",
      "functions_1": "```js\nfunction sum(a, b) {\n  return a + b;\n}\n```",
      "functions_2": "**return** возвращает значение из функции, **console.log** просто выводит в консоль. Если нет return, функция вернёт undefined.",
      "functions_3": "**Параметры** — переменные в определении функции. **Аргументы** — конкретные значения при вызове.",
      "functions_4": "```js\nfunction isEven(n) {\n  return n % 2 === 0;\n}\n```",
      "functions_5": "Недостающие аргументы становятся undefined. Лишние — доступны через `arguments` или rest.",
      "functions_6": "```js\nfunction greet(name = 'гость') {\n  return `Привет, ${name}`;\n}\n```",
      "functions_7": "```js\nfunction power(base, exp = 2) {\n  return base ** exp;\n}\n```",
      "functions_8": "**arguments** — псевдомассив всех аргументов внутри функции. ```js\nfunction logAll() {\n  for (let i = 0; i < arguments.length; i++) {\n    console.log(arguments[i]);\n  }\n}\n```",
      "functions_9": "```js\nfunction max(a, b, c) {\n  return Math.max(a, b, c);\n}\n```",
      "functions_10": "**rest-параметр** собирает оставшиеся аргументы в массив. ```js\nfunction sumAll(...nums) {\n  return nums.reduce((s, n) => s + n, 0);\n}\n```",
      "functions_11": "```js\nfunction repeat(str, n) {\n  return str.repeat(n);\n}\n```",
      "functions_12": "Function Declaration поднимается (hoisting) целиком, её можно вызвать до объявления.",
      "functions_13": "Да, Function Declaration можно вызвать до объявления благодаря hoisting'у.",
      "functions_14": "```js\nfunction celsiusToFahrenheit(c) {\n  return c * 9/5 + 32;\n}\n```",
      "functions_15": "```js\nfunction getFullName(firstName, lastName) {\n  return `${firstName} ${lastName}`;\n}\n```",
      "functions_16": "Если нет return, функция возвращает undefined.",
      "functions_17": "```js\nfunction absolute(n) {\n  return n < 0 ? -n : n;\n}\n```",
      "functions_18": "**Рекурсия** — вызов функции самой себя. ```js\nfunction countdown(n) {\n  if (n < 0) return;\n  console.log(n);\n  countdown(n - 1);\n}\n```",
      "functions_19": "```js\nfunction clamp(val, min, max) {\n  return Math.min(max, Math.max(min, val));\n}\n```",
      "functions_20": "**Function scope** — переменные видны только внутри функции. Блочная область видимости (let/const) — внутри { }.",
      "functions_21": "**Замыкание** — функция, запоминающая свои внешние переменные. ```js\nfunction makeCounter() {\n  let count = 0;\n  return function() {\n    return ++count;\n  };\n}\n```",
      "functions_22": "```js\nfunction makeMultiplier(factor) {\n  return function(x) {\n    return x * factor;\n  };\n}\n```",
      "functions_23": "**Чистая функция**: всегда одинаковый результат для одних аргументов, нет побочных эффектов. Чистая: `sum(a,b)`. Нечистая: `Math.random()`.",
      "functions_24": "```js\nfunction factorial(n) {\n  if (n <= 1) return 1;\n  return n * factorial(n - 1);\n}\n```",
      "functions_25": "**Функция высшего порядка** принимает функцию как аргумент или возвращает её. Пример: `map`, `filter`.",
      "functions_26": "```js\nfunction compose(f, g) {\n  return function(x) {\n    return f(g(x));\n  };\n}\n```",
      "functions_27": "**Каррирование** — преобразование функции `f(a,b)` в `f(a)(b)`. ```js\nconst sum = a => b => a + b;\n```",
      "functions_28": "**call** — вызывает с указанием this и аргументами через запятую. **apply** — с массивом аргументов. **bind** — возвращает новую функцию с привязанным this. ```js\nfunc.call(obj, 1, 2);\nfunc.apply(obj, [1, 2]);\nconst bound = func.bind(obj, 1);\n```",
      "functions_29": "**this** зависит от контекста вызова: глобальный объект, объект перед точкой, или undefined в строгом режиме.",
      "functions_30": "```js\nfunction memoize(fn) {\n  const cache = new Map();\n  return function(arg) {\n    if (cache.has(arg)) return cache.get(arg);\n    const result = fn(arg);\n    cache.set(arg, result);\n    return result;\n  };\n}\n```",
      "functions_31": "**IIFE** — функция, выполняющаяся сразу после объявления. ```js\n(function() { console.log('IIFE'); })();\n``` Нужна для изоляции области видимости.",
      "functions_32": "```js\nconst pipe = (...fns) => x => fns.reduce((v, f) => f(v), x);\n```",
      "functions_33": "**Побочные эффекты** — изменения внешнего состояния (глобальные переменные, DOM, запросы). Усложняют тестирование и отладку.",
      "functions_34": "```js\nfunction once(fn) {\n  let called = false;\n  return function(...args) {\n    if (called) return;\n    called = true;\n    return fn(...args);\n  };\n}\n```",
      "functions_35": "Рекурсия без базового случая уходит в бесконечность и вызывает **stack overflow** — переполнение стека вызовов.",
      "functions_36": "```js\nfunction debounce(fn, delay) {\n  let timer;\n  return function(...args) {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), delay);\n  };\n}\n```",
      "functions_37": "**Частичное применение** — фиксация части аргументов. ```js\nfunction partial(fn, ...args) {\n  return function(...moreArgs) {\n    return fn(...args, ...moreArgs);\n  };\n}\n```",
      "functions_38": "```js\nfunction deepClone(obj) {\n  if (obj === null || typeof obj !== 'object') return obj;\n  const clone = Array.isArray(obj) ? [] : {};\n  for (let key in obj) {\n    clone[key] = deepClone(obj[key]);\n  }\n  return clone;\n}\n```",
      "functions_39": "**Хвостовая рекурсия** — рекурсивный вызов последним действием. ```js\nfunction factorial(n, acc = 1) {\n  if (n <= 1) return acc;\n  return factorial(n - 1, n * acc);\n}\n```",
      "functions_40": "```js\nfunction curry(fn) {\n  return function curried(...args) {\n    if (args.length >= fn.length) {\n      return fn(...args);\n    }\n    return (...more) => curried(...args, ...more);\n  };\n}\n```",
      "functions_41": "```js\nfunction trampoline(fn) {\n  return function(...args) {\n    let result = fn(...args);\n    while (typeof result === 'function') {\n      result = result();\n    }\n    return result;\n  };\n}\n```",
      "functions_42": "```js\nfunction throttle(fn, limit) {\n  let inThrottle;\n  return function(...args) {\n    if (!inThrottle) {\n      fn(...args);\n      inThrottle = true;\n      setTimeout(() => inThrottle = false, limit);\n    }\n  };\n}\n```",
      "functions_43": "**Maybe** — монада для безопасной обработки null/undefined. ```js\nconst Maybe = (value) => ({\n  map: fn => value == null ? Maybe(null) : Maybe(fn(value)),\n  get: () => value\n});\n```",
      "functions_44": "```js\nfunction memoizeDeep(fn) {\n  const cache = new Map();\n  return function(obj) {\n    const key = JSON.stringify(obj);\n    if (cache.has(key)) return cache.get(key);\n    const result = fn(obj);\n    cache.set(key, result);\n    return result;\n  };\n}\n```",

          { d: "medium", t: "Напиши обработчик событий с сохранением контекста через стрелочную функцию внутри класса." },
          { d: "hard", t: "Объясни почему стрелочные функции нельзя использовать как генераторы (<code>function*</code>)." },
          { d: "hard", t: "Реализуй Y-комбинатор используя только стрелочные функции." },
          { d: "hard", t: "Напиши <code>const memoize = fn => { ... }</code> через стрелки с WeakMap для объектных аргументов." },
          { d: "hard", t: "Объясни разницу лексического <code>this</code> в стрелках внутри методов объекта vs внутри конструктора класса." },
          { d: "hard", t: "Реализуй полноценный <code>curry</code> через стрелочные функции: <code>const curry = fn => ...</code>." },
          { d: "hard", t: "Напиши цепочку стрелочных функций реализующую паттерн Builder для создания объекта конфигурации." },
          { d: "hard", t: 'Что такое "arrow function в prototype"? Почему это анти-паттерн? Покажи проблему с памятью.' },
          { d: "hard", t: "Реализуй <code>const trampoline = fn => (...args) => {...}</code> через стрелочные функции." },
          { d: "hard", t: "Напиши стрелочную функцию реализующую бесточечный стиль (point-free style) для обработки массива." },
          { d: "hard", t: "Реализуй <code>const asyncPipe = (...fns) => x => ...</code> для цепочки async/await функций." },
          { d: "hard", t: 'Что такое "стрелочная функция и деструктуризация с переименованием и дефолтами"? Напиши сложный пример.' },
          { d: "hard", t: "Объясни как стрелочные функции влияют на производительность в горячих путях (hot paths) кода." },
          { d: "hard", t: "Реализуй функциональный <code>Option/Maybe</code> тип используя только стрелочные функции и замыкания." },
          { d: "hard", t: "Напиши <code>const createTask = (fn) => ({run: () => fn(), map: (f) => createTask(() => f(fn()))})</code> — объясни этот паттерн." },
          { d: "hard", t: "Что произойдёт с <code>this</code> в стрелочной функции внутри <code>eval()</code>?" },
          { d: "hard", t: "Реализуй реактивную переменную <code>createSignal</code> (как в Solid.js) через стрелочные функции и замыкания." },
          { d: "hard", t: "Напиши <code>const flow = (...fns) => async (...args) => ...</code> с обработкой ошибок на каждом шаге." },
          { d: "hard", t: "Объясни как стрелочные функции работают с <code>Proxy</code> — какие ловушки можно перехватить?" },
          { d: "hard", t: 'Реализуй паттерн "функциональное обновление состояния" используя только стрелочные функции (без мутаций).' },
          { d: "hard", t: "Напиши <code>const useReducer = (reducer, init) => {...}</code> — мини-хук через стрелочные функции и замыкания." },
        ],
      },
    ];

    const STORAGE_KEY = "jsTasks3_done";
    let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    let currentFilter = "all";
    let searchQuery = "";
    const TOTAL = 200;

    function formatAnswer(text) {
      if (!text) return '<p>Ответ готовится...</p>';
      let formatted = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/```js\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/```ini\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/```json\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/```yaml\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
      return `<p>${formatted}</p>`;
    }

    function toggleAnswer(card, id) {
      let answerDiv = card.querySelector('.answer-block');
      if (!answerDiv) {
        answerDiv = document.createElement('div');
        answerDiv.className = 'answer-block';
        const answerText = ANSWERS[id] || 'Ответ готовится...';
        answerDiv.innerHTML = formatAnswer(answerText);
        card.appendChild(answerDiv);
      }
      answerDiv.classList.toggle('show');
    }

    function renderAll() {
      const root = document.getElementById("tasksRoot");
      root.innerHTML = "";
      let easy = 0,
        med = 0,
        hard = 0;
      TOPICS.forEach((t) =>
        t.tasks.forEach((tk) => {
          if (tk.d === "easy") easy++;
          else if (tk.d === "medium") med++;
          else hard++;
        }),
      );
      document.getElementById("easyCount").textContent = easy;
      document.getElementById("medCount").textContent = med;
      document.getElementById("hardCount").textContent = hard;

      let num = 0;
      TOPICS.forEach((topic) => {
        const sec = document.createElement("section");
        sec.className = "topic-section";

        const hdr = document.createElement("div");
        hdr.className = "topic-header";
        hdr.innerHTML = `
          <div class="topic-icon" style="background:${topic.color}22;color:${topic.color}">${topic.icon}</div>
          <span class="topic-title">${topic.title}</span>
          <span class="topic-count">${topic.tasks.length} заданий</span>
        `;
        sec.appendChild(hdr);

        const grid = document.createElement("div");
        grid.className = "task-grid";

        topic.tasks.forEach((task, i) => {
          num++;
          const id = `${topic.id}_${i}`;
          const isDone = !!done[id];

          const card = document.createElement("div");
          card.className = "task-card" + (isDone ? " done" : "");
          card.style.setProperty("--card-color", topic.color);
          card.dataset.diff = task.d;
          card.dataset.done = isDone ? "1" : "0";
          card.dataset.text = task.t.replace(/<[^>]+>/g, "").toLowerCase();
          card.dataset.id = id;

          const diffLabel = { easy: "Лёгкое", medium: "Среднее", hard: "Сложное" }[task.d];
          const diffClass = { easy: "diff-easy", medium: "diff-medium", hard: "diff-hard" }[task.d];

          card.innerHTML = `
            <div class="task-top">
              <span class="task-num">#${String(num).padStart(3, "0")}</span>
              <span class="difficulty ${diffClass}">${diffLabel}</span>
            </div>
            <div class="task-text">${task.t}</div>
            ${task.code ? `<div class="code-block">${task.code}</div>` : ""}
            <div class="task-actions">
              <button class="btn-done" onclick="event.stopPropagation(); toggleDone('${id}', this)">
                ${isDone ? "✅ Сделано" : "○ Выполнено"}
              </button>
            </div>
          `;

          card.addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-done')) return;
            toggleAnswer(card, id);
          });

          grid.appendChild(card);
        });

        sec.appendChild(grid);
        root.appendChild(sec);
      });

      updateProgress();
      applyFilter();
    }

    function toggleDone(id, btn) {
      done[id] = !done[id];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
      const card = btn.closest(".task-card");
      card.classList.toggle("done", done[id]);
      card.dataset.done = done[id] ? "1" : "0";
      btn.innerHTML = done[id] ? "✅ Сделано" : "○ Выполнено";
      updateProgress();
    }

    function updateProgress() {
      const cnt = Object.values(done).filter(Boolean).length;
      const pct = ((cnt / TOTAL) * 100).toFixed(1);
      document.getElementById("progressBar").style.width = pct + "%";
      document.getElementById("progressText").textContent = `${cnt} / ${TOTAL}`;
      document.getElementById("floatCounter").textContent = `✅ ${cnt} / ${TOTAL}`;
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      applyFilter();
    }

    function filterTasks() {
      searchQuery = document.getElementById("searchInput").value.toLowerCase();
      applyFilter();
    }

    function applyFilter() {
      document.querySelectorAll(".task-card").forEach((card) => {
        let show = true;
        if (currentFilter === "easy") show = card.dataset.diff === "easy";
        else if (currentFilter === "medium") show = card.dataset.diff === "medium";
        else if (currentFilter === "hard") show = card.dataset.diff === "hard";
        else if (currentFilter === "done") show = card.dataset.done === "1";
        else if (currentFilter === "undone") show = card.dataset.done === "0";
        if (searchQuery && !card.dataset.text.includes(searchQuery)) show = false;
        card.classList.toggle("hidden", !show);
      });
      document.querySelectorAll(".topic-section").forEach((sec) => {
        const vis = [...sec.querySelectorAll(".task-card")].some((c) => !c.classList.contains("hidden"));
        sec.classList.toggle("hidden", !vis);
      });
    }

    function resetAll() {
      if (confirm("Сбросить весь прогресс?")) {
        done = {};
        localStorage.removeItem(STORAGE_KEY);
        renderAll();
      }
    }

    renderAll();
  </script>
</body>
</html>
