<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Tasks — Типы данных и структуры (200 заданий с ответами)</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap");

    :root {
      --bg: #0b1020;
      --surface: #11172a;
      --card: #161d34;
      --border: #2a355a;
      --text: #e5ecff;
      --muted: #94a3c4;
      --accent: #5eead4;
      --accent2: #60a5fa;
      --accent3: #f59e0b;
      --accent4: #22c55e;
      --accent5: #ef4444;
      --accent6: #a78bfa;
      --answer-bg: #0e1425;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(94, 234, 212, 0.1), transparent 25%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    header {
      padding: 64px 0 36px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #061018;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: 1.05;
      font-weight: 900;
      background: linear-gradient(135deg, #fff, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 760px;
      margin: 0 auto 34px;
      line-height: 1.6;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .stat-chip {
      background: rgba(22, 29, 52, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 18px;
      display: flex;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stat-chip .num {
      color: var(--accent);
      font-size: 1.35rem;
      font-weight: 800;
    }

    .toolbar,
    .progress-wrap {
      background: rgba(22, 29, 52, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 22px;
      backdrop-filter: blur(10px);
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .progress-label {
      font-weight: 700;
      white-space: nowrap;
    }

    .progress-bar {
      flex: 1;
      min-width: 220px;
      height: 10px;
      background: #0e1425;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 0.35s ease;
    }

    .progress-count {
      font-family: "JetBrains Mono", monospace;
      color: var(--accent);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s;
    }

    .btn-reset:hover {
      color: white;
      border-color: var(--accent5);
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 240px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border-radius: 12px;
      background: #0e1425;
      border: 1px solid var(--border);
      color: var(--text);
      outline: none;
      font-size: 0.95rem;
    }

    .search-wrap::before {
      content: "🔎";
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.95rem;
    }

    .filter-btn {
      background: #0e1425;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      color: white;
      border-color: var(--accent2);
      background: rgba(96, 165, 250, 0.12);
    }

    .topic-section {
      margin-top: 34px;
    }

    .topic-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(11, 16, 32, 0.92);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .topic-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .topic-title {
      font-size: 1.32rem;
      font-weight: 800;
    }

    .topic-count {
      margin-left: auto;
      color: var(--muted);
      border: 1px solid var(--border);
      background: #0e1425;
      border-radius: 999px;
      padding: 5px 11px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
    }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
    }

    .task-card {
      background: rgba(22, 29, 52, 0.94);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .task-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, var(--card-color, var(--accent2)), transparent);
      opacity: 0;
      transition: 0.18s;
    }

    .task-card:hover {
      transform: translateY(-3px);
      border-color: var(--card-color, var(--accent2));
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    }

    .task-card:hover::before {
      opacity: 1;
    }

    .task-card.done {
      border-color: rgba(34, 197, 94, 0.4);
      background: rgba(34, 197, 94, 0.08);
    }

    .task-card.done::before {
      opacity: 1;
      background: linear-gradient(90deg, var(--accent4), transparent);
    }

    .task-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .task-num {
      font-family: "JetBrains Mono", monospace;
      color: var(--muted);
      background: #0e1425;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.76rem;
    }

    .difficulty {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .diff-easy {
      background: rgba(34, 197, 94, 0.14);
      color: var(--accent4);
    }
    .diff-medium {
      background: rgba(245, 158, 11, 0.14);
      color: var(--accent3);
    }
    .diff-hard {
      background: rgba(239, 68, 68, 0.14);
      color: var(--accent5);
    }

    .task-text {
      font-size: 0.94rem;
      line-height: 1.65;
      color: var(--text);
      margin-bottom: 16px;
    }

    .task-text code {
      font-family: "JetBrains Mono", monospace;
      background: #0e1425;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 2px 6px;
      color: var(--accent);
      font-size: 0.85em;
    }

    .answer-block {
      font-size: 0.9rem;
      line-height: 1.65;
      background: var(--answer-bg);
      border-left: 3px solid var(--card-color, var(--accent2));
      border-radius: 8px;
      padding: 14px 16px;
      margin: 12px 0 10px;
      color: #cbd5e1;
      display: none;
      font-family: "Inter", sans-serif;
    }
    
    .answer-block.show {
      display: block;
    }
    
    .answer-block code {
      font-family: "JetBrains Mono", monospace;
      background: #1e1e2e;
      color: var(--accent2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.84em;
    }
    
    .answer-block pre {
      background: #1e1e2e;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      position: relative;
      z-index: 5;
    }

    .btn-done {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 9px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.18s;
      pointer-events: auto;
    }

    .btn-done:hover {
      border-color: var(--accent4);
      color: var(--accent4);
    }

    .task-card.done .btn-done {
      color: var(--accent4);
      border-color: var(--accent4);
      background: rgba(34, 197, 94, 0.08);
    }

    .hidden {
      display: none !important;
    }

    .float-counter {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #041018;
      padding: 14px 18px;
      border-radius: 18px;
      font-weight: 900;
      box-shadow: 0 16px 40px rgba(96, 165, 250, 0.35);
      z-index: 100;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
    }

    @media (max-width: 680px) {
      .task-grid {
        grid-template-columns: 1fr;
      }
      .float-counter {
        right: 12px;
        bottom: 12px;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="badge">✦ JavaScript Practice</div>
      <h1>200 заданий<br />по структурам данных</h1>
      <p class="subtitle">
        Типы данных · примитивы · числа · строки · массивы · Map/Set · Date ·
        JSON
      </p>

      <div class="stats">
        <div class="stat-chip"><span class="num">200</span> заданий</div>
        <div class="stat-chip"><span class="num">13</span> тем</div>
        <div class="stat-chip"><span class="num" id="easyCount">0</span> лёгких</div>
        <div class="stat-chip"><span class="num" id="medCount">0</span> средних</div>
        <div class="stat-chip"><span class="num" id="hardCount">0</span> сложных</div>
      </div>
    </header>

    <div class="progress-wrap">
      <span class="progress-label">⚡ Прогресс</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
      </div>
      <span class="progress-count" id="progressText">0 / 200</span>
      <button class="btn-reset" onclick="resetAll()">Сбросить</button>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Поиск задания..." oninput="filterTasks()" />
      </div>
      <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
      <button class="filter-btn" onclick="setFilter('easy', this)">Лёгкие</button>
      <button class="filter-btn" onclick="setFilter('medium', this)">Средние</button>
      <button class="filter-btn" onclick="setFilter('hard', this)">Сложные</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Выполненные</button>
      <button class="filter-btn" onclick="setFilter('undone', this)">Невыполненные</button>
    </div>

    <div id="tasksRoot"></div>
  </div>

  <div class="float-counter" id="floatCounter">✅ 0 / 200</div>

  <script>
    // ==================== ОТВЕТЫ ====================
    const ANSWERS = {
      "types_0": "**Примитивы**: string, number, boolean, null, undefined, symbol, bigint.",
      "types_1": "Примитивы хранятся по значению, объекты — по ссылке. Примитивы неизменяемы, объекты — изменяемы.",

      "types_4": "`typeof []` → 'object', `typeof {}` → 'object', `typeof Symbol('id')` → 'symbol', `typeof 10n` → 'bigint'.",

      "types_9": "```js\nfunction humanType(value) {\n  if (value === null) return 'null';\n  if (value === undefined) return 'undefined';\n  if (Array.isArray(value)) return 'array';\n  if (typeof value === 'object') return 'object';\n  if (typeof value === 'function') return 'function';\n  return typeof value;\n}\n```",
      "types_10": "**Falsy**: false, 0, -0, 0n, '', null, undefined, NaN. Остальные — truthy.",
      "types_11": "Функция — объект, потому что у неё есть свойства и методы: fn.name, fn.length, fn.apply() и т.д.",
      "types_12": "```js\nfunction isPlainObject(value) {\n  return Object.prototype.toString.call(value) === '[object Object]';\n}\n```",
      "types_13": "**typeof** не различает объекты, **Array.isArray** только для массивов, **Object.prototype.toString** даёт точную строку.",
      "types_14": "```js\nfunction typeStats(arr) {\n  return arr.reduce((acc, val) => {\n    const type = val === null ? 'null' : typeof val;\n    acc[type] = (acc[type] || 0) + 1;\n    return acc;\n  }, {});\n}\n```",
      
      "primitive_methods_0": "Примитивы временно оборачиваются в объект-обёртку, у которого вызывается метод, после чего обёртка удаляется.",
      "primitive_methods_1": "Создаётся временный объект String, вызывается его метод, возвращается результат, объект уничтожается.",
      "primitive_methods_2": "'123.46' — как строка, потому что toFixed возвращает строку.",
      "primitive_methods_3": "'true' — булево преобразуется в объект Boolean, вызывается toString().",
      "primitive_methods_4": "У них нет объектов-обёрток, попытка вызова метода приведёт к ошибке.",
      "primitive_methods_5": "```js\nconst str = 'abc';\nstr.charAt(0); // временный объект String\n```",
      "primitive_methods_6": "Примитивная строка — примитив, объект — настоящий объект: typeof для них разный, instanceof тоже.",
      "primitive_methods_7": "new Number(5) — объект, 5 — примитив. В сравнениях они ведут себя по-разному: new Number(5) == 5 — true, но === — false.",
      "primitive_methods_8": "```js\nfunction callMethod(value, method) {\n  if (value && typeof value[method] === 'function') {\n    return value[method]();\n  }\n  return null;\n}\n```",

      "numbers_0": "Числа с плавающей точкой двойной точности (64 бита), включают целые, дробные, Infinity, -Infinity, NaN.",
      "numbers_1": "0.1 + 0.2 === 0.30000000000000004 из-за погрешности двоичного представления чисел с плавающей точкой.",
      "numbers_2": "**parseInt** читает целое число до первого нецифрового символа, **parseFloat** — число с точкой.",

      "numbers_4": "```js\nMath.round(4.7) // 5\nMath.floor(4.7) // 4\nMath.ceil(4.1) // 5\n```",
      "numbers_5": "Math.floor(Math.random() * 10) + 1",
      "numbers_6": "**NaN** — Not-a-Number. Проверка: Number.isNaN(value) или value !== value.",
      "numbers_7": "```js\nfunction isFiniteNumber(value) {\n  return typeof value === 'number' && isFinite(value);\n}\n```",

      "numbers_10": "(123).toString(2) → '1111011'",
      "numbers_11": "**Infinity** — результат деления на 0 или превышения допустимого числа. 1/0 → Infinity.",
      "numbers_12": "```js\nfunction sumDigits(n) {\n  return Math.abs(n).toString().split('').reduce((sum, d) => sum + +d, 0);\n}\n```",

      "numbers_14": "```js\nconst big = 10n;\nbig + 5n; // ок\nbig + 5; // ошибка\n```",

      "strings_0": "```js\nconst s1 = 'строка';\nconst s2 = \"строка\";\nconst s3 = `строка`;\n```",

      "strings_2": "'hello'.toUpperCase() → 'HELLO', 'HELLO'.toLowerCase() → 'hello'",

      "strings_9": "```js\nfunction countChar(str, char) {\n  return str.split(char).length - 1;\n}\n```",
      "strings_10": "```js\nstr.trim().replace(/\\s+/g, ' ');\n```",
      "strings_11": "**replace** — заменяет первое вхождение, **replaceAll** — все (нужно глобальное регулярное выражение или строка).",

      "strings_15": "```js\nfunction parseQuery(str) {\n  return Object.fromEntries(str.split('&').map(pair => {\n    const [k, v] = pair.split('=');\n    return [k, decodeURIComponent(v)];\n  }));\n}\n```",

      "arrays_0": "```js\n[1,2,3]; ['a','b'];\n```",
      "arrays_1": "arr[0], arr[arr.length-1], arr[arr.length-2]",
      "arrays_2": "Возвращает undefined.",
      "arrays_3": "arr.push(4), arr.unshift(0)",

        title: "Формат JSON, метод toJSON",
        icon: "🧾",
        color: "#ef4444",
        tasks: [
          { d: "easy", t: "Что такое JSON? Чем он отличается от обычного объекта JavaScript?" },
          { d: "easy", t: "Преобразуй объект в JSON-строку через <code>JSON.stringify()</code>." },
          { d: "easy", t: "Преобразуй JSON-строку обратно в объект через <code>JSON.parse()</code>." },
          { d: "easy", t: "Какие типы данных корректно сериализуются в JSON, а какие нет?" },
          { d: "easy", t: "Что происходит с функциями, <code>undefined</code> и <code>Symbol</code> при <code>JSON.stringify()</code>?" },
          { d: "easy", t: "Что произойдёт с объектом <code>Date</code> при сериализации в JSON?" },
          { d: "medium", t: "Используй второй аргумент <code>JSON.stringify()</code> — массив разрешённых ключей." },
          { d: "medium", t: "Используй второй аргумент <code>JSON.stringify()</code> как функцию-replacer." },
          { d: "medium", t: "Используй третий аргумент <code>JSON.stringify()</code> для красивого форматирования." },
          { d: "medium", t: "Используй второй аргумент <code>JSON.parse()</code> как функцию-reviver." },
          { d: "medium", t: "Напиши пример, где через <code>reviver</code> строка даты превращается обратно в объект <code>Date</code>." },
          { d: "medium", t: "Что делает метод <code>toJSON()</code>? Напиши объект со своим <code>toJSON()</code>." },
          { d: "medium", t: "Покажи, как <code>toJSON()</code> меняет результат сериализации объекта." },
          { d: "medium", t: "Сериализуй <code>Map</code> вручную в JSON и потом восстанови его." },
          { d: "medium", t: "Сериализуй <code>Set</code> вручную в JSON и потом восстанови его." },
          { d: "hard", t: "Объясни, почему циклические ссылки ломают <code>JSON.stringify()</code>." },
          { d: "hard", t: "Реализуй безопасную сериализацию объекта с циклическими ссылками." },
          { d: "hard", t: "Сделай функцию <code>saveState(obj)</code> и <code>loadState(json)</code> для сохранения и восстановления состояния приложения." },
          { d: "hard", t: "Напиши объект с несколькими уровнями вложенности и кастомными <code>toJSON()</code> у внутренних объектов." },
        ],
      },
    ];

    const STORAGE_KEY = "jsTasks6_done";
    let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    let currentFilter = "all";
    let searchQuery = "";
    const TOTAL = 200;

    function formatAnswer(text) {
      if (!text) return '<p>Ответ готовится...</p>';
      let formatted = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/```js\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
      return `<p>${formatted}</p>`;
    }

    function toggleAnswer(card, id) {
      let answerDiv = card.querySelector('.answer-block');
      if (!answerDiv) {
        answerDiv = document.createElement('div');
        answerDiv.className = 'answer-block';
        const answerText = ANSWERS[id] || 'Ответ готовится...';
        answerDiv.innerHTML = formatAnswer(answerText);
        card.appendChild(answerDiv);
      }
      answerDiv.classList.toggle('show');
    }

    function renderAll() {
      const root = document.getElementById("tasksRoot");
      root.innerHTML = "";

      let easy = 0,
        medium = 0,
        hard = 0;
      TOPICS.forEach((topic) =>
        topic.tasks.forEach((task) => {
          if (task.d === "easy") easy++;
          else if (task.d === "medium") medium++;
          else hard++;
        }),
      );

      document.getElementById("easyCount").textContent = easy;
      document.getElementById("medCount").textContent = medium;
      document.getElementById("hardCount").textContent = hard;

      let taskNumber = 0;

      TOPICS.forEach((topic) => {
        const section = document.createElement("section");
        section.className = "topic-section";

        const header = document.createElement("div");
        header.className = "topic-header";
        header.innerHTML = `
          <div class="topic-icon" style="background:${topic.color}22;color:${topic.color}">${topic.icon}</div>
          <div class="topic-title">${topic.title}</div>
          <div class="topic-count">${topic.tasks.length} заданий</div>
        `;
        section.appendChild(header);

        const grid = document.createElement("div");
        grid.className = "task-grid";

        topic.tasks.forEach((task, index) => {
          taskNumber++;
          const id = `${topic.id}_${index}`;
          const isDone = !!done[id];

          const labels = { easy: "Лёгкое", medium: "Среднее", hard: "Сложное" };
          const diffClasses = { easy: "diff-easy", medium: "diff-medium", hard: "diff-hard" };

          const card = document.createElement("div");
          card.className = `task-card${isDone ? " done" : ""}`;
          card.style.setProperty("--card-color", topic.color);
          card.dataset.id = id;
          card.dataset.diff = task.d;
          card.dataset.done = isDone ? "1" : "0";
          card.dataset.text = task.t.replace(/<[^>]+>/g, "").toLowerCase();

          card.innerHTML = `
            <div class="task-top">
              <span class="task-num">#${String(taskNumber).padStart(3, "0")}</span>
              <span class="difficulty ${diffClasses[task.d]}">${labels[task.d]}</span>
            </div>
            <div class="task-text">${task.t}</div>
            <div class="task-actions">
              <button class="btn-done" onclick="event.stopPropagation(); toggleDone('${id}', this)">
                ${isDone ? "✅ Сделано" : "○ Выполнено"}
              </button>
            </div>
          `;

          card.addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-done')) return;
            toggleAnswer(card, id);
          });

          grid.appendChild(card);
        });

        section.appendChild(grid);
        root.appendChild(section);
      });

      updateProgress();
      applyFilter();
    }

    function toggleDone(id, btn) {
      done[id] = !done[id];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(done));

      const card = btn.closest(".task-card");
      const isDone = !!done[id];

      card.classList.toggle("done", isDone);
      card.dataset.done = isDone ? "1" : "0";
      btn.textContent = isDone ? "✅ Сделано" : "○ Выполнено";

      updateProgress();
      applyFilter();
    }

    function updateProgress() {
      const completed = Object.values(done).filter(Boolean).length;
      const percent = ((completed / TOTAL) * 100).toFixed(1);
      document.getElementById("progressBar").style.width = percent + "%";
      document.getElementById("progressText").textContent = `${completed} / ${TOTAL}`;
      document.getElementById("floatCounter").textContent = `✅ ${completed} / ${TOTAL}`;
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll(".filter-btn").forEach((el) => el.classList.remove("active"));
      btn.classList.add("active");
      applyFilter();
    }

    function filterTasks() {
      searchQuery = document.getElementById("searchInput").value.toLowerCase().trim();
      applyFilter();
    }

    function applyFilter() {
      document.querySelectorAll(".task-card").forEach((card) => {
        const diff = card.dataset.diff;
        const isDone = card.dataset.done === "1";
        const text = card.dataset.text;

        let visible = true;

        if (currentFilter === "easy") visible = diff === "easy";
        else if (currentFilter === "medium") visible = diff === "medium";
        else if (currentFilter === "hard") visible = diff === "hard";
        else if (currentFilter === "done") visible = isDone;
        else if (currentFilter === "undone") visible = !isDone;

        if (searchQuery && !text.includes(searchQuery)) visible = false;
        card.classList.toggle("hidden", !visible);
      });

      document.querySelectorAll(".topic-section").forEach((section) => {
        const hasVisibleCards = [...section.querySelectorAll(".task-card")].some((card) => !card.classList.contains("hidden"));
        section.classList.toggle("hidden", !hasVisibleCards);
      });
    }

    function resetAll() {
      if (confirm("Сбросить весь прогресс?")) {
        done = {};
        localStorage.removeItem(STORAGE_KEY);
        renderAll();
      }
    }

    renderAll();
  </script>
</body>
